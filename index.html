<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>NEON PULSE // REBOOT</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <script>
        // ON DÉFINIT LES FONCTIONS AVANT TOUT LE RESTE
        let socket;
        let currentAns = "";

        // Initialisation immédiate au chargement de la page
        window.onload = function() {
            socket = io();
            
            socket.on('connect', () => {
                const status = document.getElementById('status');
                if(status) {
                    status.innerText = "[ SYSTEM READY ]";
                    status.style.color = "#39ff14";
                }
            });

            // Écouteurs de messages
            socket.on('hostStatus', (isHost) => {
                const btn = document.getElementById('start-btn');
                if(btn) btn.classList.toggle('hidden', !isHost);
            });

            socket.on('updateLobby', (players) => {
                const list = document.getElementById('player-list');
                if(list) list.innerHTML = players.map(p => `<div>> ${p.username}: ${p.score}XP</div>`).join('');
            });

            socket.on('gameStart', () => {
                document.getElementById('view-join').classList.add('hidden');
                document.getElementById('view-lobby').classList.add('hidden');
                document.getElementById('view-game').classList.remove('hidden');
            });

            socket.on('nextQuestion', (q) => {
                currentAns = q.correct;
                document.getElementById('q-text').innerText = q.text;
                const box = document.getElementById('choices-box');
                box.innerHTML = "";
                q.choices.forEach(c => {
                    const b = document.createElement('button');
                    b.innerText = c;
                    b.className = "choice-btn";
                    b.onclick = () => {
                        const ok = c.trim().toLowerCase() === currentAns.trim().toLowerCase();
                        socket.emit('submitAnswer', { isCorrect: ok });
                        reveal(b);
                    };
                    box.appendChild(b);
                });
            });

            socket.on('timerUpdate', (t) => {
                document.getElementById('timer-bar').style.width = (t/15)*100 + "%";
            });

            socket.on('timeUp', (ans) => {
                if(ans) currentAns = ans;
                reveal(null);
            });

            socket.on('yourScore', (s) => {
                document.getElementById('xp').innerText = s.toString().padStart(4, '0');
            });
        };

        // LES DEUX FONCTIONS CLÉS
        function join() {
            console.log("Exécution de join()...");
            const nick = document.getElementById('nick').value || "USER";
            socket.emit('joinGame', nick);
            document.getElementById('view-join').classList.add('hidden');
            document.getElementById('view-lobby').classList.remove('hidden');
            
            // Son
            const m = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3");
            m.volume = 0.1;
            m.play().catch(() => {});
        }

        function launch() {
            socket.emit('startGameRequest');
        }

        function reveal(clicked) {
            document.querySelectorAll('.choice-btn').forEach(b => {
                b.disabled = true;
                if(b.innerText.trim().toLowerCase() === currentAns.trim().toLowerCase()) {
                    b.style.background = "#39ff14";
                    b.style.color = "#000";
                } else if(b === clicked) {
                    b.style.background = "#ff0055";
                }
            });
        }
    </script>

    <style>
        :root { --neon: #00f2ff; --pink: #ff0055; --bg: #020008; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Rajdhani'; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #app { width: 90%; max-width: 600px; border: 2px solid var(--neon); padding: 40px; text-align: center; position: relative; background: rgba(0,0,0,0.9); box-shadow: 0 0 30px var(--neon); }
        .hidden { display: none !important; }
        h1 { font-family: 'Orbitron'; font-size: 3rem; color: var(--neon); margin: 0; }
        input { background: #000; border: 1px solid var(--neon); color: #fff; padding: 15px; width: 80%; text-align: center; margin-top: 20px; font-family: 'Orbitron'; }
        button { background: none; border: 2px solid var(--neon); color: var(--neon); padding: 15px 30px; cursor: pointer; font-family: 'Orbitron'; margin-top: 20px; transition: 0.3s; }
        button:hover { background: var(--neon); color: #000; }
        .choice-btn { width: 100%; margin: 5px 0; }
        #timer-bar { position: absolute; top: 0; left: 0; height: 5px; background: var(--pink); width: 100%; transition: width 1s linear; }
    </style>
</head>
<body>

<div id="app">
    <div id="timer-bar"></div>

    <div id="view-join">
        <div id="status" style="color: var(--pink); font-size: 0.8rem;">[ CONNECTING... ]</div>
        <h1>NEON PULSE</h1>
        <input type="text" id="nick" placeholder="IDENTIFIER">
        <br>
        <button onclick="join()">INITIALIZE</button>
    </div>

    <div id="view-lobby" class="hidden">
        <h2 style="color: var(--neon);">LOBBY SYNC</h2>
        <div id="player-list" style="margin: 20px 0;"></div>
        <button id="start-btn" class="hidden" onclick="launch()">START PROTOCOL</button>
    </div>

    <div id="view-game" class="hidden">
        <h2 id="q-text">...</h2>
        <div id="choices-box"></div>
        <h3 style="color: var(--pink);">XP: <span id="xp">0000</span></h3>
    </div>
</div>

</body>
</html>
