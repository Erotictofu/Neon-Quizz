<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Pulse V3 - Ultra Neon Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020008; --panel: #050510; --neon-blue: #00f2ff; --neon-pink: #ff0055; --neon-green: #39ff14; --text: #e0e0ff; }
        body { font-family: 'Rajdhani', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        #main-wrapper { display: flex; gap: 20px; width: 95%; max-width: 1000px; height: 600px; }
        #quiz-container { flex: 2; background: var(--panel); padding: 2rem; border-radius: 10px; border: 2px solid var(--neon-blue); box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); text-align: center; position: relative; display: flex; flex-direction: column; justify-content: center; }
        #chat-container { flex: 1; background: var(--panel); border: 1px solid var(--neon-blue); border-radius: 10px; display: flex; flex-direction: column; height: 100%; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.9rem; text-align: left; }
        #chat-input-area { display: flex; border-top: 1px solid var(--neon-blue); }
        #chat-input { background: transparent; border: none; color: white; padding: 10px; flex: 1; outline: none; }
        #timer-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); position: absolute; top: 0; left: 0; }
        #timer-bar { width: 100%; height: 100%; background: var(--neon-blue); transition: width 1s linear; }
        .btn-stack { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { background: rgba(0, 242, 255, 0.03); color: var(--neon-blue); border: 1px solid var(--neon-blue); padding: 15px; font-family: 'Rajdhani'; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        button.correct { background: var(--neon-green) !important; color: #000 !important; }
        button.wrong { background: var(--neon-pink) !important; color: #fff !important; }
        input[type="text"] { background: rgba(0, 242, 255, 0.05); border: 1px solid var(--neon-blue); padding: 12px; color: var(--neon-blue); text-align: center; font-family: 'Orbitron'; margin-bottom: 20px; width: 80%; }
        .hidden { display: none !important; }
        .streak-badge { color: gold; font-weight: bold; font-size: 1.2rem; display: block; height: 20px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="main-wrapper">
    <div id="quiz-container">
        <div id="timer-container"><div id="timer-bar"></div></div>
        
        <div id="start-screen">
            <h1>NEON PULSE</h1>
            <div id="login-zone">
                <input type="text" id="username-input" placeholder="CODE NAME..." maxlength="12">
                <button onclick="joinLobby()" style="width:100%; border-color: var(--neon-pink); color: var(--neon-pink);">ACCÉDER AU RÉSEAU</button>
            </div>
            <div id="lobby-zone" class="hidden">
                <div id="lobby-list" style="margin-bottom:20px;"></div>
                <button id="ready-btn" onclick="sendReady()" style="width:100%; border-color: var(--neon-green); color: var(--neon-green);">SYNCHRONISER</button>
            </div>
        </div>

        <div id="game-screen" class="hidden">
            <span id="streak-info" class="streak-badge"></span>
            <div id="q-info" style="font-family:Orbitron; font-size:0.8rem; color:var(--neon-blue); margin-bottom:10px;">FLUX <span id="q-num">1</span>/50</div>
            <div id="question" style="margin-bottom:20px; font-size:1.3rem;">...</div>
            <div id="options" class="btn-stack"></div>
            <div id="score-display" style="margin-top:20px; font-family:Orbitron; color:var(--neon-pink)">XP: <span id="score-val">0000</span></div>
        </div>

        <div id="winner-screen" class="hidden">
            <h1 style="color:gold;">👑 GAGNANT</h1>
            <h2 id="winner-name">---</h2>
            <button onclick="location.reload()">REJOUER</button>
        </div>
    </div>

    <div id="chat-container">
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Message..." maxlength="50">
        </div>
    </div>
</div>

<audio id="bgm" loop></audio>
<audio id="sfx-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
<audio id="sfx-wrong" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>
<audio id="sfx-tick" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let currentCorrectAnswer = "";
    const playlist = ["https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"];

    function joinLobby() {
        const name = document.getElementById("username-input").value.trim().toUpperCase() || "INT_" + Math.floor(Math.random()*999);
        const bgm = document.getElementById("bgm");
        bgm.src = playlist[Math.floor(Math.random()*playlist.length)];
        bgm.volume = 0.1; bgm.play();
        document.getElementById("login-zone").classList.add("hidden");
        document.getElementById("lobby-zone").classList.remove("hidden");
        socket.emit('joinGame', name);
    }

    function sendReady() {
        document.getElementById("ready-btn").disabled = true;
        socket.emit('playerReady');
    }

    socket.on('updateLobby', (players) => {
        document.getElementById("lobby-list").innerHTML = players.map(p => `<div style="color:${p.ready?'var(--neon-green)':'white'}">${p.username} ${p.ready?'[PRÊT]':'[ATTENTE]'}</div>`).join('');
    });

    socket.on('gameStart', () => {
        document.getElementById("start-screen").classList.add("hidden");
        document.getElementById("game-screen").classList.remove("hidden");
    });

    socket.on('nextQuestion', (qData) => {
        currentCorrectAnswer = qData.correct;
        document.getElementById("q-num").innerText = qData.number;
        document.getElementById("question").innerText = qData.text;
        const container = document.getElementById("options");
        container.innerHTML = "";
        qData.choices.forEach(choice => {
            const btn = document.createElement("button");
            btn.innerText = choice;
            btn.onclick = () => {
                const isCorrect = (choice === qData.correct);
                reveal(btn, isCorrect);
                socket.emit('submitAnswer', { isCorrect });
            };
            container.appendChild(btn);
        });
    });

    socket.on('timerUpdate', (time) => {
        document.getElementById("timer-bar").style.width = (time/15)*100 + "%";
        if(time <= 3 && time > 0) document.getElementById("sfx-tick").play();
    });

    socket.on('feedback', (data) => {
        if(data.type === 'correct') {
            document.getElementById("sfx-correct").play();
            if(data.streak >= 3) document.getElementById("streak-info").innerText = "SÉRIE X" + data.streak + " ! 🔥";
        } else {
            document.getElementById("sfx-wrong").play();
            document.getElementById("streak-info").innerText = "";
        }
    });

    function reveal(btn, isCorrect) {
        document.querySelectorAll('#options button').forEach(b => {
            b.disabled = true;
            if(b.innerText === currentCorrectAnswer) b.classList.add('correct');
        });
        if(btn && !isCorrect) btn.classList.add('wrong');
    }

    socket.on('yourScore', (score) => document.getElementById("score-val").innerText = score.toString().padStart(4, '0'));

    // CHAT JS
    document.getElementById("chat-input").addEventListener("keypress", (e) => {
        if(e.key === "Enter" && e.target.value.trim()) {
            socket.emit('chatMessage', e.target.value);
            e.target.value = "";
        }
    });

    socket.on('newChatMessage', (data) => {
        const msgDiv = document.createElement("div");
        msgDiv.innerHTML = `<b style="color:var(--neon-blue)">${data.user}:</b> ${data.text}`;
        const chatBox = document.getElementById("chat-messages");
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    socket.on('gameOver', (data) => {
        document.getElementById("game-screen").classList.add("hidden");
        document.getElementById("winner-screen").classList.remove("hidden");
        document.getElementById("winner-name").innerText = data.winner;
    });
</script>
</body>
</html>
