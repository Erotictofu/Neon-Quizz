<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON PULSE - Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Source+Code+Pro&display=swap" rel="stylesheet">
    
    <script src="/socket.io/socket.io.js"></script>

    <style>
        :root { --bg: #010005; --neon: #00f2ff; --pink: #ff0055; }
        
        body { 
            background: var(--bg); 
            color: #e0e0ff; 
            font-family: 'Source Code Pro', monospace;
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            overflow: hidden;
            background-image: linear-gradient(0deg, transparent 24%, rgba(32, 32, 64, 0.3) 25%, rgba(32, 32, 64, 0.3) 26%, transparent 27%);
            background-size: 50px 50px;
        }

        #main-container {
            width: 90%;
            max-width: 600px;
            background: rgba(5, 5, 15, 0.9);
            border: 2px solid var(--neon);
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 20px var(--neon);
            position: relative;
            z-index: 999; /* Force l'affichage au dessus du fond */
        }

        h1 { font-family: 'Orbitron'; color: var(--neon); font-size: 2.5rem; text-shadow: 0 0 10px var(--neon); }
        
        input {
            background: #000; border: 1px solid var(--neon); padding: 15px;
            color: var(--neon); width: 80%; margin-bottom: 20px; font-family: 'Orbitron';
        }

        button {
            background: transparent; border: 2px solid var(--pink); color: var(--pink);
            padding: 15px 30px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold;
            text-transform: uppercase; transition: 0.3s;
        }

        button:hover { background: var(--pink); color: white; }
        .hidden { display: none !important; }

        .btn-stack { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .choice-btn { border: 1px solid var(--neon); color: var(--neon); }
        .correct { background: #39ff14 !important; color: black !important; }
        .wrong { background: #ff0055 !important; color: white !important; }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="start-screen">
            <h1>NEON PULSE</h1>
            <input type="text" id="username-input" placeholder="CODE NAME...">
            <br>
            <button onclick="joinLobby()">INITIALIZE</button>
            <div id="lobby-zone" class="hidden">
                <p id="host-msg">CONNECTING...</p>
                <div id="lobby-list"></div>
                <button id="start-btn" class="hidden" onclick="requestStart()">START GAME</button>
            </div>
        </div>

        <div id="game-screen" class="hidden">
            <div id="timer-bar" style="height:5px; background:var(--neon); width:100%; margin-bottom:10px;"></div>
            <p id="q-info">QUESTION <span id="q-num">1</span>/50</p>
            <h3 id="question-text">CHARGEMENT...</h3>
            <div id="options-container" class="btn-stack"></div>
            <h2 id="score-display">XP: <span id="score-val">0000</span></h2>
        </div>
    </div>

    <script>
        const socket = io();
        let currentCorrectAnswer = "";

        function joinLobby() {
            const name = document.getElementById("username-input").value || "UNIT_" + Math.floor(Math.random()*99);
            document.getElementById("username-input").classList.add("hidden");
            document.querySelector("#start-screen button").classList.add("hidden");
            document.getElementById("lobby-zone").classList.remove("hidden");
            socket.emit('joinGame', name);
        }

        socket.on('hostStatus', (isHost) => {
            if(isHost) {
                document.getElementById("start-btn").classList.remove("hidden");
                document.getElementById("host-msg").innerText = "YOU ARE THE HOST";
            } else {
                document.getElementById("host-msg").innerText = "WAITING FOR HOST...";
            }
        });

        function requestStart() { socket.emit('startGameRequest'); }

        socket.on('updateLobby', (players) => {
            document.getElementById("lobby-list").innerHTML = players.map(p => `<div>${p.username}</div>`).join('');
        });

        socket.on('gameStart', () => {
            document.getElementById("start-screen").classList.add("hidden");
            document.getElementById("game-screen").classList.remove("hidden");
        });

        socket.on('nextQuestion', (qData) => {
            currentCorrectAnswer = qData.correct;
            document.getElementById("q-num").innerText = qData.number;
            document.getElementById("question-text").innerText = qData.text;
            const container = document.getElementById("options-container");
            container.innerHTML = "";
            qData.choices.forEach(choice => {
                const btn = document.createElement("button");
                btn.className = "choice-btn";
                btn.innerText = choice;
                btn.onclick = () => {
                    reveal(btn, choice === qData.correct);
                    socket.emit('submitAnswer', { isCorrect: choice === qData.correct });
                };
                container.appendChild(btn);
            });
        });

        function reveal(btn, isCorrect) {
            document.querySelectorAll(".choice-btn").forEach(b => {
                b.disabled = true;
                if(b.innerText === currentCorrectAnswer) b.classList.add("correct");
            });
            if(btn && !isCorrect) btn.classList.add("wrong");
        }

        socket.on('yourScore', (s) => document.getElementById("score-val").innerText = s);
        socket.on('timerUpdate', (t) => document.getElementById("timer-bar").style.width = (t/15)*100 + "%");
    </script>
</body>
</html>
