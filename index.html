<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON PULSE - Protocol 50</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Source+Code+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #010005; --panel: rgba(5, 5, 15, 0.9);
            --neon-blue: #00f2ff; --neon-blue-glow: rgba(0, 242, 255, 0.5);
            --neon-pink: #ff0055; --neon-pink-glow: rgba(255, 0, 85, 0.5);
            --neon-green: #39ff14; --neon-green-glow: rgba(57, 255, 20, 0.5);
            --text: #e0e0ff; --sub-text: #8080ff;
        }

        /* FOND DYNAMIQUE & GRILLE perspective */
        body {
            font-family: 'Source Code Pro', monospace; background-color: var(--bg); color: var(--text);
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden;
            background-image:
                linear-gradient(0deg, transparent 24%, rgba(32, 32, 64, 0.3) 25%, rgba(32, 32, 64, 0.3) 26%, transparent 27%, transparent 74%, rgba(32, 32, 64, 0.3) 75%, rgba(32, 32, 64, 0.3) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(32, 32, 64, 0.3) 25%, rgba(32, 32, 64, 0.3) 26%, transparent 27%, transparent 74%, rgba(32, 32, 64, 0.3) 75%, rgba(32, 32, 64, 0.3) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            animation: grid-move 10s linear infinite;
        }

        @keyframes grid-move { 0% { background-position: 0 0; } 100% { background-position: 50px 50px; } }

        /* EFFET CRT GLOBALE (SCANLINES + GLITCH) */
        body::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px; z-index: 100; pointer-events: none; opacity: 0.15;
        }

        #main-wrapper { display: flex; gap: 20px; width: 95%; max-width: 1200px; height: 700px; position: relative; z-index: 10; }

        /* PANNEAU PRINCIPAL STYLISÉ */
        #quiz-container {
            flex: 2; background: var(--panel); padding: 2rem; border-radius: 5px;
            border: 2px solid var(--neon-blue); box-shadow: 0 0 20px var(--neon-blue-glow), inset 0 0 15px rgba(0,242,255,0.1);
            text-align: center; position: relative; display: flex; flex-direction: column; justify-content: space-between;
            clip-path: polygon(0% 0%, 100% 0%, 100% 95%, 95% 100%, 0% 100%); /* Coins biseautés */
        }

        /* CHAT CYBERPUNK */
        #chat-container {
            flex: 1; background: var(--panel); border: 1px solid var(--sub-text); border-radius: 5px;
            display: flex; flex-direction: column; height: 100%; box-shadow: 0 0 10px rgba(128, 128, 255, 0.1);
            clip-path: polygon(5% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 5%);
        }

        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; font-size: 0.85rem; color: var(--sub-text); font-family: 'Source Code Pro', monospace; }
        #chat-input-area { display: flex; border-top: 1px solid var(--sub-text); background: rgba(0,0,0,0.2); }
        #chat-input { background: transparent; border: none; color: white; padding: 12px; flex: 1; outline: none; font-family: 'Source Code Pro'; }

        /* BARRE DE TEMPS "PULSE" */
        #timer-container { width: 100%; height: 8px; background: rgba(255,255,255,0.05); position: absolute; top: 0; left: 0; overflow: hidden;}
        #timer-bar {
            width: 100%; height: 100%; background: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue), 0 0 30px var(--neon-blue);
            transition: width 1s linear; position: relative;
        }
        #timer-bar::after { content:''; position:absolute; top:0; left:0; right:0; bottom:0; background:linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent); animation: pulse-scan 1s infinite; }
        @keyframes pulse-scan { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        /* TITRES & TEXTES GLITCH */
        h1 { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 2.5rem; color: var(--neon-blue); text-shadow: 0 0 15px var(--neon-blue),
