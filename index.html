<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON PULSE 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --neon: #00f2ff; --pink: #ff0055; --green: #39ff14; --bg: #020008; }
        
        body { 
            margin: 0; background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }

        /* Animation de fond (Grid Cyberpunk) */
        .background-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--neon) 1px, transparent 1px), linear-gradient(90deg, var(--neon) 1px, transparent 1px);
            background-size: 50px 50px; opacity: 0.1;
            transform: perspective(500px) rotateX(60deg); transform-origin: top;
            animation: grid-move 2s linear infinite; z-index: -1;
        }
        @keyframes grid-move { from { background-position: 0 0; } to { background-position: 0 50px; } }

        #game-window {
            width: 90%; max-width: 800px; background: rgba(5, 5, 20, 0.95);
            border: 3px solid var(--neon); padding: 30px; text-align: center;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.3); position: relative;
        }

        .hidden { display: none !important; }

        h1 { font-family: 'Orbitron'; font-weight: 900; letter-spacing: 8px; color: var(--neon); text-shadow: 0 0 20px var(--neon); margin: 0 0 20px 0; }

        input {
            background: #000; border: 2px solid var(--neon); color: white;
            padding: 15px; font-family: 'Orbitron'; width: 60%; text-align: center; outline: none;
        }

        button {
            background: transparent; border: 2px solid var(--neon); color: var(--neon);
            padding: 15px 30px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer;
            text-transform: uppercase; transition: 0.3s; margin: 10px;
        }
        button:hover:not(:disabled) { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }
        button:disabled { opacity: 0.8; cursor: default; }

        /* Couleurs de réponse */
        .correct { background: var(--green) !important; color: #000 !important; border-color: #fff !important; box-shadow: 0 0 30px var(--green) !important; }
        .wrong { background: var(--pink) !important; color: #fff !important; border-color: #fff !important; box-shadow: 0 0 30px var(--pink) !important; }

        #timer-wrap { width: 100%; height: 6px; background: rgba(255,255,255,0.1); position: absolute; top: 0; left: 0; }
        #timer-bar { width: 100%; height: 100%; background: var(--neon); transition: width 1s linear; box-shadow: 0 0 10px var(--neon); }

        .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        #xp-counter { font-family: 'Orbitron'; font-size: 2rem; color: var(--pink); margin-top: 20px; }
    </style>
</head>
<body>

<div class="background-grid"></div>

<div id="game-window">
    <div id="timer-wrap"><div id="timer-bar"></div></div>

    <div id="view-join">
        <h1>NEON PULSE</h1>
        <input type="text" id="username" placeholder="IDENTIFIER" maxlength="12">
        <br><br>
        <button onclick="initAction()">INITIALIZE</button>
    </div>

    <div id="view-lobby" class="hidden">
        <h2 id="status-text">CONNECTING TO GRID...</h2>
        <div id="players" style="margin: 20px 0;"></div>
        <button id="btn-start" class="hidden" onclick="startAction()" style="border-color: var(--green); color: var(--green);">[ START PROTOCOL ]</button>
    </div>

    <div id="view-game" class="hidden">
        <div id="streak-ui" style="color: gold; height: 25px; font-weight: bold;"></div>
        <h2 id="question-text" style="min-height: 100px; font-size: 1.5rem;">WAITING FOR DATA...</h2>
        <div id="choices-area" class="choice-grid"></div>
        <div id="xp-counter">XP: <span id="xp-val">0000</span></div>
    </div>
</div>

<audio id="bg-music" loop></audio>

<script>
    const socket = io();
    let currentCorrect = "";
    const musicUrls = [
        "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
        "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"
    ];

    function initAction() {
        const name = document.getElementById('username').value.trim() || "UNIT_" + Math.floor(Math.random()*99);
        socket.emit('joinGame', name);
        
        // Musique
        const audio = document.getElementById('bg-music');
        audio.src = musicUrls[Math.floor(Math.random()*musicUrls.length)];
        audio.volume = 0.15;
        audio.play().catch(() => console.log("Interaction requise pour l'audio"));

        document.getElementById('view-join').classList.add('hidden');
        document.getElementById('view-lobby').classList.remove('hidden');
    }

    function startAction() {
        socket.emit('startGameRequest');
    }

    socket.on('hostStatus', (isHost) => {
        const btn = document.getElementById('btn-start');
        const status = document.getElementById('status-text');
        if(isHost) {
            btn.classList.remove('hidden');
            status.innerText = ">> YOU ARE PRIMARY OPERATOR";
        } else {
            btn.classList.add('hidden');
            status.innerText = ">> AWAITING OPERATOR...";
        }
    });

    socket.on('updateLobby', (players) => {
        document.getElementById('players').innerHTML = players.map(p => `<div>${p.username}: ${p.score}XP</div>`).join('');
    });

    socket.on('gameStart', () => {
        document.getElementById('view-lobby').classList.add('hidden');
        document.getElementById('view-game').classList.remove('hidden');
    });

    socket.on('nextQuestion', (q) => {
        currentCorrect = q.correct;
        document.getElementById('question-text').innerText = q.text;
        const area = document.getElementById('choices-area');
        area.innerHTML = "";
        
        q.choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.innerText = choice;
            btn.onclick = () => {
                const isCorrect = choice.trim().toLowerCase() === currentCorrect.trim().toLowerCase();
                socket.emit('submitAnswer', { isCorrect });
                revealAction(btn);
            };
            area.appendChild(btn);
        });
    });

    function revealAction(clickedBtn) {
        const buttons = document.querySelectorAll('#choices-area button');
        buttons.forEach(b => {
            b.disabled = true;
            // Vérification ultra-souple pour le vert
            if (b.innerText.trim().toLowerCase() === currentCorrect.trim().toLowerCase()) {
                b.classList.add('correct');
            } else if (b === clickedBtn) {
                b.classList.add('wrong');
            }
        });
    }

    socket.on('timerUpdate', (t) => {
        document.getElementById('timer-bar').style.width = (t/15)*100 + "%";
    });

    socket.on('timeUp', (correctAnswer) => {
        currentCorrect = correctAnswer;
        revealAction(null);
    });

    socket.on('yourScore', (score) => {
        document.getElementById('xp-val').innerText = score.toString().padStart(4, '0');
    });

    socket.on('feedback', (data) => {
        document.getElementById('streak-ui').innerText = data.streak >= 3 ? "🔥 STREAK X" + data.streak : "";
    });
</script>
</body>
</html>
