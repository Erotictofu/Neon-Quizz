<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>NEON PULSE // INTERFACE 2.0</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --pink: #ff0055; --green: #39ff14; --bg: #020008; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Rajdhani'; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* Perspective Grid */
        .grid {
            position: fixed; width: 200%; height: 200%; top: -50%; left: -50%;
            background-image: linear-gradient(var(--neon) 1px, transparent 1px), linear-gradient(90deg, var(--neon) 1px, transparent 1px);
            background-size: 60px 60px; opacity: 0.08; transform: perspective(800px) rotateX(60deg);
            animation: grid-move 2s linear infinite; z-index: -1;
        }
        @keyframes grid-move { from { transform: perspective(800px) rotateX(60deg) translateY(0); } to { transform: perspective(800px) rotateX(60deg) translateY(60px); } }

        #app {
            width: 90%; max-width: 800px; background: rgba(5, 5, 20, 0.9);
            border: 1px solid var(--neon); padding: 50px; text-align: center;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.1); position: relative;
            clip-path: polygon(0 5%, 5% 0, 95% 0, 100% 5%, 100% 95%, 95% 100%, 5% 100%, 0 95%);
        }

        .hidden { display: none !important; }

        h1 { 
            font-family: 'Orbitron'; font-size: 4rem; margin: 0; color: #fff; 
            text-shadow: 2px 2px var(--pink), -2px -2px var(--neon);
            letter-spacing: 15px;
        }

        input {
            background: rgba(0,0,0,0.7); border: 2px solid var(--neon); color: #fff;
            padding: 20px; font-family: 'Orbitron'; text-align: center; width: 80%; margin-top: 40px;
            font-size: 1.2rem; outline: none;
        }

        button {
            background: rgba(0, 242, 255, 0.05); border: 2px solid var(--neon); color: var(--neon);
            padding: 20px 40px; font-family: 'Orbitron'; cursor: pointer; transition: 0.3s;
            font-size: 1rem; letter-spacing: 3px; margin-top: 30px;
        }
        button:hover:not(:disabled) { background: var(--neon); color: #000; box-shadow: 0 0 40px var(--neon); }

        .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        #timer-bar { position: absolute; top: 0; left: 0; height: 5px; background: var(--pink); width: 100%; transition: width 1s linear; }
        .xp-badge { display: inline-block; padding: 10px 20px; border: 1px solid var(--pink); color: var(--pink); font-family: 'Orbitron'; font-size: 1.5rem; margin-top: 20px; }
    </style>
</head>
<body>

<div class="grid"></div>

<div id="app">
    <div id="timer-bar"></div>

    <div id="view-join">
        <div id="connection-status" style="font-size: 0.8rem; color: var(--pink);">[ STATUS: DISCONNECTED ]</div>
        <h1>NEON<br>PULSE</h1>
        <input type="text" id="nick" placeholder="USER_IDENTIFIER" maxlength="12">
        <br>
        <button id="join-btn" onclick="join()">CONNECT TO GRID</button>
    </div>

    <div id="view-lobby" class="hidden">
        <h2 id="host-status" style="color: var(--neon); letter-spacing: 5px;">SYNCHRONIZING...</h2>
        <div id="player-list" style="margin: 30px 0; text-align: left; font-family: monospace; color: var(--neon);"></div>
        <button id="start-btn" class="hidden" onclick="launch()" style="width: 100%; border-color: var(--green); color: var(--green);">>> INITIALIZE PROTOCOL</button>
    </div>

    <div id="view-game" class="hidden">
        <h2 id="q-text" style="min-height: 120px; font-size: 1.6rem;">DATA RETRIEVAL...</h2>
        <div id="choices-box" class="choices"></div>
        <div class="xp-badge">XP // <span id="xp">0000</span></div>
    </div>
</div>

<audio id="music" loop></audio>

<script>
    // ON INITIALISE LE SOCKET TOUT DE SUITE
    const socket = io();
    let currentAns = "";

    // ON DÉFINIT LES FONCTIONS AVANT TOUT
    function join() {
        console.log("Clic sur Connect détecté");
        const nickInput = document.getElementById('nick');
        const name = nickInput.value.trim() || "PILOT_" + Math.floor(Math.random()*99);
        
        socket.emit('joinGame', name);
        
        document.getElementById('view-join').classList.add('hidden');
        document.getElementById('view-lobby').classList.remove('hidden');

        const m = document.getElementById('music');
        m.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3";
        m.volume = 0.15;
        m.play().catch(() => console.log("Musique bloquée par le navigateur"));
    }

    function launch() {
        console.log("Lancement du jeu...");
        socket.emit('startGameRequest');
    }

    // GESTION DES EVENEMENTS SOCKET
    socket.on('connect', () => {
        document.getElementById('connection-status').innerText = "[ STATUS: LINK ESTABLISHED ]";
        document.getElementById('connection-status').style.color = "var(--green)";
    });

    socket.on('hostStatus', (isHost) => {
        const btn = document.getElementById('start-btn');
        btn.classList.toggle('hidden', !isHost);
        document.getElementById('host-status').innerText = isHost ? "OPERATOR ACCESS GRANTED" : "SYNCHRONIZING WITH OPERATOR...";
    });

    socket.on('updateLobby', (players) => {
        const list = document.getElementById('player-list');
        if(list) {
            list.innerHTML = players.map(p => 
                `<div>[ONLINE] ${p.username.padEnd(15, '.')} STATUS: OK | ${p.score} XP</div>`
            ).join('');
        }
    });

    socket.on('gameStart', () => {
        document.getElementById('view-lobby').classList.add('hidden');
        document.getElementById('view-game').classList.remove('hidden');
    });

    socket.on('nextQuestion', (q) => {
        currentAns = q.correct;
        document.getElementById('q-text').innerText = q.text;
        const box = document.getElementById('choices-box');
        box.innerHTML = "";
        q.choices.forEach(c => {
            const b = document.createElement('button');
            b.innerText = c;
            b.onclick = () => {
                const ok = c.trim().toLowerCase() === currentAns.trim().toLowerCase();
                socket.emit('submitAnswer', { isCorrect: ok });
                revealButtons(b);
            };
            box.appendChild(b);
        });
    });

    function revealButtons(clicked) {
        document.querySelectorAll('#choices-box button').forEach(b => {
            b
