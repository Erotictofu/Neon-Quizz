<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>NEON PULSE // INTERFACE 2.0</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --pink: #ff0055; --green: #39ff14; --bg: #020008; }
        
        body { 
            margin: 0; background: var(--bg); color: #fff; font-family: 'Rajdhani';
            display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }

        /* Scanline Laser Effect */
        .laser-scan {
            position: fixed; top: -100%; left: 0; width: 100%; height: 100px;
            background: linear-gradient(to bottom, transparent, var(--neon), transparent);
            opacity: 0.1; pointer-events: none; z-index: 5;
            animation: scan 4s linear infinite;
        }
        @keyframes scan { 0% { top: -100%; } 100% { top: 200%; } }

        /* Perspective Grid */
        .grid {
            position: fixed; width: 200%; height: 200%; top: -50%; left: -50%;
            background-image: linear-gradient(var(--neon) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--neon) 1px, transparent 1px);
            background-size: 60px 60px; opacity: 0.08;
            transform: perspective(800px) rotateX(60deg);
            animation: grid-move 2s linear infinite; z-index: -1;
        }
        @keyframes grid-move { from { transform: perspective(800px) rotateX(60deg) translateY(0); } to { transform: perspective(800px) rotateX(60deg) translateY(60px); } }

        #app {
            width: 90%; max-width: 800px; background: rgba(5, 5, 20, 0.9);
            border: 1px solid var(--neon); padding: 50px; text-align: center;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.1), inset 0 0 30px rgba(0, 242, 255, 0.05);
            position: relative; clip-path: polygon(0 5%, 5% 0, 95% 0, 100% 5%, 100% 95%, 95% 100%, 5% 100%, 0 95%);
        }

        /* Decorative Corners */
        #app::before, #app::after {
            content: ""; position: absolute; width: 40px; height: 40px; border: 3px solid var(--pink); z-index: 2;
        }
        #app::before { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        #app::after { bottom: -2px; right: -2px; border-left: none; border-top: none; }

        .hidden { display: none !important; }

        h1 { 
            font-family: 'Orbitron'; font-size: 4rem; margin: 0; color: #fff; 
            text-shadow: 2px 2px var(--pink), -2px -2px var(--neon);
            letter-spacing: 15px; animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 2px var(--pink), -2px -2px var(--neon); }
            1% { text-shadow: -5px 2px var(--pink), 5px -2px var(--neon); }
            2% { text-shadow: 2px 2px var(--pink), -2px -2px var(--neon); }
        }

        input {
            background: rgba(0,0,0,0.7); border: 2px solid var(--neon); color: #fff;
            padding: 20px; font-family: 'Orbitron'; text-align: center; width: 80%; margin-top: 40px;
            font-size: 1.2rem; outline: none; transition: 0.3s;
        }
        input:focus { box-shadow: 0 0 20px var(--neon); border-color: #fff; }

        button {
            background: none; border: 2px solid var(--neon); color: var(--neon);
            padding: 20px 40px; font-family: 'Orbitron'; cursor: pointer; transition: 0.3s;
            font-size: 1rem; letter-spacing: 3px; margin-top: 30px;
            background: rgba(0, 242, 255, 0.05);
        }
        button:hover:not(:disabled) {
            background: var(--neon); color: #000; box-shadow: 0 0 40px var(--neon);
            transform: translateY(-3px);
        }

        .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        
        #timer-bar { position: absolute; top: 0; left: 0; height: 5px; background: var(--pink); width: 100%; transition: width 1s linear; }

        /* XP Counter Badge */
        .xp-badge {
            display: inline-block; padding: 10px 20px; border: 1px solid var(--pink);
            color: var(--pink); font-family: 'Orbitron'; font-size: 1.5rem; margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="laser-scan"></div>
<div class="grid"></div>

<div id="app">
    <div id="timer-bar"></div>

    <div id="view-join">
        <div style="font-size: 0.8rem; color: var(--neon); margin-bottom: 10px;">[ SYSTEM BOOT : SUCCESSFUL ]</div>
        <h1>NEON<br>PULSE</h1>
        <div style="width: 50%; height: 1px; background: var(--neon); margin: 20px auto; opacity: 0.5;"></div>
        <input type="text" id="nick" placeholder="USER_IDENTIFIER" maxlength="12">
        <br>
        <button onclick="join()">CONNECT TO GRID</button>
    </div>

    <div id="view-lobby" class="hidden">
        <h2 id="host-status" style="color: var(--neon); letter-spacing: 5px;">ESTABLISHING LINK...</h2>
        <div id="player-list" style="margin: 30px 0; text-align: left; font-family: monospace; color: var(--neon);"></div>
        <button id="start-btn" class="hidden" onclick="launch()" style="width: 100%; border-color: var(--green); color: var(--green);">>> INITIALIZE PROTOCOL</button>
    </div>

    <div id="view-game" class="hidden">
        <h2 id="q-text" style="min-height: 120px; font-size: 1.6rem; line-height: 1.4;">DATA RETRIEVAL...</h2>
        <div id="choices-box" class="choices"></div>
        <div class="xp-badge">XP // <span id="xp">0000</span></div>
    </div>
</div>

<audio id="music" loop></audio>

<script>
    const socket = io();
    let currentAns = "";

    function join() {
        const n = document.getElementById('nick').value || "RECRUIT";
        socket.emit('joinGame', n);
        
        const m = document.getElementById('music');
        m.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3";
        m.volume = 0.15;
        m.play().catch(()=>{});

        document.getElementById('view-join').classList.add('hidden');
        document.getElementById('view-lobby').classList.remove('hidden');
    }

    function launch() { socket.emit('startGameRequest'); }

    socket.on('hostStatus', (isHost) => {
        const btn = document.getElementById('start-btn');
        btn.classList.toggle('hidden', !isHost);
        document.getElementById('host-status').innerText = isHost ? "OPERATOR ACCESS GRANTED" : "SYNCHRONIZING WITH OPERATOR...";
    });

    socket.on('updateLobby', (players) => {
        document.getElementById('player-list').innerHTML = players.map(p => 
            `<div>[ONLINE] ${p.username.padEnd(15, '.')} STATUS: OK | ${p.score} XP</div>`
        ).join('');
    });

    socket.on('gameStart', () => {
        document.getElementById('view-lobby').classList.add('hidden');
        document.getElementById('view-game').classList.remove('hidden');
    });

    socket.on('nextQuestion', (q) => {
        currentAns = q.correct;
        document.getElementById('q-text').innerText = q.text;
        const box = document.getElementById('choices-box');
        box.innerHTML = "";
        q.choices.forEach(c => {
            const b = document.createElement('button');
            b.innerText = c;
            b.onclick = () => {
                const isOk = c.trim().toLowerCase() === currentAns.trim().toLowerCase();
                socket.emit('submitAnswer', { isCorrect: isOk });
                reveal(b);
            };
            box.appendChild(b);
        });
    });

    function reveal(clicked) {
        document.querySelectorAll('#choices-box button').forEach(b => {
            b.disabled = true;
            if(b.innerText.trim().toLowerCase() === currentAns.trim().toLowerCase()) {
                b.style.background = "var(--green)";
                b.style.color = "#000";
                b.style.boxShadow = "0 0 30px var(--green)";
            } else if(b === clicked) {
                b.style.background = "var(--pink)";
                b.style.boxShadow = "0 0 30px var(--pink)";
            }
        });
    }

    socket.on('timerUpdate', (t) => {
        document.getElementById('timer-bar').style.width = (t/15)*100 + "%";
    });

    socket
