<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON PULSE - Protocol 50</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Source+Code+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #010005; --panel: rgba(5, 5, 15, 0.95);
            --neon-blue: #00f2ff; --neon-blue-glow: rgba(0, 242, 255, 0.5);
            --neon-pink: #ff0055; --neon-pink-glow: rgba(255, 0, 85, 0.5);
            --neon-green: #39ff14; --neon-green-glow: rgba(57, 255, 20, 0.5);
            --text: #e0e0ff; --sub-text: #8080ff;
        }

        /* GRILLE DE FOND ANIMÉE */
        body {
            font-family: 'Source Code Pro', monospace; background-color: var(--bg); color: var(--text);
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(32, 32, 64, 0.3) 25%, rgba(32, 32, 64, 0.3) 26%, transparent 27%, transparent 74%, rgba(32, 32, 64, 0.3) 75%, rgba(32, 32, 64, 0.3) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(32, 32, 64, 0.3) 25%, rgba(32, 32, 64, 0.3) 26%, transparent 27%, transparent 74%, rgba(32, 32, 64, 0.3) 75%, rgba(32, 32, 64, 0.3) 76%, transparent 77%, transparent);
            background-size: 50px 50px; animation: grid-move 10s linear infinite;
        }
        @keyframes grid-move { 0% { background-position: 0 0; } 100% { background-position: 50px 50px; } }

        #main-wrapper { 
            display: flex; gap: 20px; width: 95%; max-width: 1100px; height: 85vh; z-index: 10;
        }

        /* CONTAINER PRINCIPAL */
        #quiz-container {
            flex: 2; background: var(--panel); padding: 2rem; border-radius: 5px;
            border: 2px solid var(--neon-blue); box-shadow: 0 0 25px var(--neon-blue-glow);
            text-align: center; position: relative; display: flex; flex-direction: column;
            clip-path: polygon(0% 0%, 100% 0%, 100% 95%, 95% 100%, 0% 100%);
        }

        /* CHAT */
        #chat-container {
            flex: 1; background: var(--panel); border: 1px solid var(--sub-text); border-radius: 5px;
            display: flex; flex-direction: column; clip-path: polygon(5% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 5%);
        }
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; font-size: 0.85rem; text-align: left; }
        #chat-input { background: rgba(255,255,255,0.05); border: none; border-top: 1px solid var(--sub-text); color: white; padding: 12px; outline: none; }

        /* HUD & ÉLÉMENTS */
        h1 { font-family: 'Orbitron', sans-serif; font-size: 3rem; color: var(--neon-blue); text-shadow: 0 0 15px var(--neon-blue); margin-bottom: 30px; }
        #timer-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); position: absolute; top: 0; left: 0; }
        #timer-bar { width: 100%; height: 100%; background: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); transition: width 1s linear; }

        .btn-stack { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        button {
            background: rgba(0, 242, 255, 0.05); color: var(--neon-blue); border: 2px solid var(--neon-blue);
            padding: 15px; font-family: 'Orbitron'; font-weight: 700; cursor: pointer; text-transform: uppercase;
            clip-path: polygon(10% 0%, 100% 0%, 100% 70%, 90% 100%, 0% 100%, 0% 30%); transition: 0.2s;
        }
        button:hover:not(:disabled) { background: rgba(0, 242, 255, 0.15); box-shadow: 0 0 15px var(--neon-blue); }
        
        button.correct { background: var(--neon-green) !important; color: #000 !important; border-color: #fff !important; box-shadow: 0 0 20px var(--neon-green); }
        button.wrong { background: var(--neon-pink) !important; color: #fff !important; border-color: #fff !important; box-shadow: 0 0 20px var(--neon-pink); }

        input[type="text"] {
            background: rgba(0, 242, 255, 0.1); border: 2px solid var(--neon-blue); padding: 15px;
            color: var(--neon-blue); text-align: center; font-family: 'Orbitron'; width: 70%; margin-bottom: 20px;
        }

        .hidden { display: none !important; }
        #score-display { font-family: 'Orbitron'; font-size: 1.8rem; color: var(--neon-pink); margin-top: 20px; }

        @keyframes shake { 0%, 100% { transform: translate(0, 0); } 20%, 60% { transform: translate(-5px, 0); } 40%, 80% { transform: translate(5px, 0); } }
        .damage-shake { animation: shake 0.3s ease-in-out; }
    </style>
</head>
<body>

<div id="main-wrapper">
    <div id="quiz
