<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>NEON PULSE V3</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --pink: #ff0055; --green: #39ff14; }
        body { margin: 0; background: #020008; color: #fff; font-family: 'Rajdhani'; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #app { width: 90%; max-width: 600px; border: 2px solid var(--neon); padding: 20px; text-align: center; background: rgba(0,0,0,0.8); box-shadow: 0 0 20px var(--neon); position: relative; }
        .hidden { display: none !important; }
        button { background: none; border: 2px solid var(--neon); color: var(--neon); padding: 15px; font-family: 'Orbitron'; cursor: pointer; margin: 5px; transition: 0.3s; width: 100%; }
        button:hover:not(:disabled) { background: var(--neon); color: #000; }
        .correct { background: var(--green) !important; color: #000 !important; border-color: #fff !important; }
        .wrong { background: var(--pink) !important; color: #fff !important; }
        #timer-bar { position: absolute; top: 0; left: 0; height: 5px; background: var(--neon); width: 100%; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

<div id="app">
    <div id="timer-bar"></div>

    <div id="view-join">
        <h1 style="font-family: Orbitron; color: var(--neon);">NEON PULSE</h1>
        <input type="text" id="nick" placeholder="NICKNAME" style="padding:10px; width:80%; text-align:center;">
        <br><br>
        <button onclick="join()">INITIALIZE</button>
    </div>

    <div id="view-lobby" class="hidden">
        <h2>GRID STATUS: <span id="host-status">WAITING</span></h2>
        <div id="player-list" style="margin-bottom: 20px;"></div>
        <button id="start-btn" class="hidden" onclick="launch()">EXECUTE PROTOCOL</button>
    </div>

    <div id="view-game" class="hidden">
        <h3 id="q-text">LOADING DATA...</h3>
        <div id="choices" class="grid"></div>
        <h2 style="color: var(--pink);">XP: <span id="xp">0000</span></h2>
    </div>
</div>

<audio id="music" loop></audio>

<script>
    const socket = io();
    let correctStr = "";

    function join() {
        const n = document.getElementById('nick').value || "PILOT";
        socket.emit('joinGame', n);
        const m = document.getElementById('music');
        m.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3";
        m.volume = 0.2; m.play().catch(()=>{});
        document.getElementById('view-join').classList.add('hidden');
        document.getElementById('view-lobby').classList.remove('hidden');
    }

    function launch() {
        console.log("Envoi du signal Start...");
        socket.emit('startGameRequest');
    }

    socket.on('hostStatus', (isHost) => {
        if(isHost) document.getElementById('start-btn').classList.remove('hidden');
        document.getElementById('host-status').innerText = isHost ? "PRIMARY OPERATOR" : "AWAITING OPERATOR";
    });

    socket.on('updateLobby', (players) => {
        document.getElementById('player-list').innerHTML = players.map(p => `<div>${p.username}: ${p.score}XP</div>`).join('');
    });

    socket.on('gameStart', () => {
        document.getElementById('view-lobby').classList.add('hidden');
        document.getElementById('view-game').classList.remove('hidden');
    });

    socket.on('nextQuestion', (q) => {
        correctStr = q.correct;
        document.getElementById('q-text').innerText = q.text;
        const area = document.getElementById('choices');
        area.innerHTML = "";
        q.choices.forEach(c => {
            const b = document.createElement('button');
            b.innerText = c;
            b.onclick = () => {
                const isOk = c.trim().toLowerCase() === correctStr.trim().toLowerCase();
                socket.emit('submitAnswer', { isCorrect: isOk });
                reveal(b);
            };
            area.appendChild(b);
        });
    });

    function reveal(clicked) {
        document.querySelectorAll('#choices button').forEach(b => {
            b.disabled = true;
            if(b.innerText.trim().toLowerCase() === correctStr.trim().toLowerCase()) {
                b.classList.add('correct');
            } else if(b === clicked) {
                b.classList.add('wrong');
            }
        });
    }

    socket.on('timerUpdate', (t) => document.getElementById('timer-bar').style.width = (t/15)*100 + "%");
    socket.on('timeUp', (ans) => { if(ans) correctStr = ans; reveal(null); });
    socket.on('yourScore', (s) => document.getElementById('xp').innerText = s);
</script>
</body>
</html>
