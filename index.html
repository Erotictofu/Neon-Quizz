<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>NEON PULSE - Protocol 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --neon: #00f2ff; --pink: #ff0055; --green: #39ff14; --bg: #020008; }
        body { margin:0; background:var(--bg); color:#fff; font-family:'Rajdhani'; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; }
        .grid { position:fixed; top:0; left:0; width:100%; height:100%; background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px); background-size: 40px 40px; transform: perspective(500px) rotateX(60deg); transform-origin: top; animation: move 2s linear infinite; z-index:-1; }
        @keyframes move { from { background-position: 0 0; } to { background-position: 0 40px; } }
        #app { width:90%; max-width:850px; background:rgba(5, 5, 20, 0.95); border:3px solid var(--neon); padding:30px; text-align:center; box-shadow: 0 0 30px var(--neon); position:relative; }
        .hidden { display:none !important; }
        h1 { font-family:'Orbitron'; font-weight:900; letter-spacing:5px; text-shadow: 0 0 20px var(--neon); color:var(--neon); }
        .btn-grid { display:grid; grid-template-columns:1fr 1fr; gap:15px; margin:25px 0; }
        button { background:transparent; border:2px solid var(--neon); color:var(--neon); padding:18px; font-family:'Orbitron'; font-weight:700; cursor:pointer; text-transform:uppercase; transition:0.2s; outline:none; }
        button:hover { background: rgba(0, 242, 255, 0.1); }
        .correct { background:var(--green) !important; color:#000 !important; border-color:white !important; box-shadow:0 0 25px var(--green) !important; }
        .wrong { background:var(--pink) !important; color:#fff !important; border-color:white !important; box-shadow:0 0 25px var(--pink) !important; }
        #timer-container { height:8px; width:100%; background:rgba(255,255,255,0.1); position:absolute; top:0; left:0; }
        #timer-bar { height:100%; width:100%; background:var(--neon); transition: width 1s linear; }
        #xp-display { font-family:'Orbitron'; font-size:2rem; color:var(--pink); }
        input { width:70%; padding:15px; background:rgba(0,0,0,0.5); border:2px solid var(--neon); color:white; text-align:center; margin-bottom:20px; font-family: 'Rajdhani'; font-size: 1.2rem; }
    </style>
</head>
<body>
<div class="grid"></div>
<div id="app">
    <div id="timer-container"><div id="timer-bar"></div></div>
    
    <div id="screen-join">
        <h1>NEON PULSE</h1>
        <input type="text" id="nick" placeholder=">> ENTER NICKNAME">
        <br><button onclick="join()">INITIALIZE ACCESS</button>
    </div>

    <div id="screen-lobby" class="hidden">
        <h2 id="host-msg" style="color:var(--neon)">AWAITING...</h2>
        <div id="player-list" style="margin-bottom: 20px;"></div>
        <button id="start-btn" class="hidden" onclick="start()">EXECUTE PROTOCOL</button>
    </div>

    <div id="screen-game" class="hidden">
        <div id="streak-msg" style="height:30px; color:gold; font-weight: bold;"></div>
        <h2 id="q-text" style="min-height:80px; font-family:'Orbitron';">LOADING...</h2>
        <div id="choices" class="btn-grid"></div>
        <div id="xp-display">XP: <span id="xp-val">0000</span></div>
    </div>
</div>

<script>
    const socket = io();
    let currentCorrect = "";

    function join() {
        const n = document.getElementById('nick').value || "RECRUIT";
        socket.emit('joinGame', n);
        document.getElementById('screen-join').classList.add('hidden');
        document.getElementById('screen-lobby').classList.remove('hidden');
    }

    function start() { socket.emit('startGameRequest'); }

    socket.on('hostStatus', (isHost) => {
        const btn = document.getElementById('start-btn');
        btn.classList.toggle('hidden', !isHost);
        document.getElementById('host-msg').innerText = isHost ? ">> PRIMARY OPERATOR" : ">> AWAITING OPERATOR...";
    });

    socket.on('updateLobby', (players) => {
        document.getElementById('player-list').innerHTML = players
            .map(p => `<div style="padding:5px;">${p.username} : <span style="color:var(--green)">${p.score} XP</span></div>`)
            .join('');
    });

    socket.on('gameStart', () => {
        document.getElementById('screen-lobby').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');
    });

    socket.on('nextQuestion', (q) => {
        currentCorrect = q.correct;
        document.getElementById('q-text').innerText = q.text;
        const container = document.getElementById('choices');
        container.innerHTML = "";
        q.choices.forEach(c => {
            const b = document.createElement('button');
            b.innerText = c;
            b.onclick = () => {
                const isRight = c.trim().toLowerCase() === currentCorrect.trim().toLowerCase();
                socket.emit('submitAnswer', { isCorrect: isRight });
                highlight(b);
            };
            container.appendChild(b);
        });
    });

    function highlight(clickedBtn) {
        document.querySelectorAll('#choices button').forEach(b => {
            b.disabled = true;
            if (b.innerText.trim().toLowerCase() === currentCorrect.trim().toLowerCase()) {
                b.classList.add('correct');
            } else if (b === clickedBtn) {
                b.classList.add('wrong');
            }
        });
    }

    socket.on('timerUpdate', (t) => {
        document.getElementById('timer-bar').style.width = (t / 15) * 100 + "%";
    });

    socket.on('timeUp', (ans) => {
        currentCorrect = ans;
        highlight(null);
    });

    socket.on('yourScore', (s) => {
        document.getElementById('xp-val').innerText = s.toString().padStart(4, '0');
    });

    socket.on('feedback', (f) => {
        document.getElementById('streak-msg').innerText = f.streak >= 2 ? "🔥 STREAK X" + f.streak : "";
    });
</script>
</body>
</html>
