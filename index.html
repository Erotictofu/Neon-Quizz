<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Pulse V3 - Silent Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020008; --panel: #050510; --neon-blue: #00f2ff; --neon-pink: #ff0055; --neon-green: #39ff14; --text: #e0e0ff; }
        body { font-family: 'Rajdhani', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        #main-wrapper { display: flex; gap: 20px; width: 95%; max-width: 1100px; height: 650px; }
        #quiz-container { flex: 2; background: var(--panel); padding: 2rem; border-radius: 10px; border: 2px solid var(--neon-blue); box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); text-align: center; position: relative; display: flex; flex-direction: column; }
        #chat-container { flex: 1; background: var(--panel); border: 1px solid var(--neon-blue); border-radius: 10px; display: flex; flex-direction: column; height: 100%; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.9rem; }
        #chat-input-area { display: flex; border-top: 1px solid var(--neon-blue); }
        #chat-input { background: transparent; border: none; color: white; padding: 12px; flex: 1; outline: none; }
        #timer-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); position: absolute; top: 0; left: 0; }
        #timer-bar { width: 100%; height: 100%; background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); transition: width 1s linear; }
        .btn-stack { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        button { background: rgba(0, 242, 255, 0.05); color: var(--neon-blue); border: 1px solid var(--neon-blue); padding: 15px; font-family: 'Orbitron'; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        
        /* Styles de révélation */
        button.correct { background: var(--neon-green) !important; color: #000 !important; border-color: var(--neon-green) !important; box-shadow: 0 0 20px var(--neon-green); opacity: 1 !important; }
        button.wrong { background: var(--neon-pink) !important; color: #fff !important; border-color: var(--neon-pink) !important; box-shadow: 0 0 20px var(--neon-pink); opacity: 1 !important; }
        
        input[type="text"] { background: rgba(0, 242, 255, 0.05); border: 1px solid var(--neon-blue); padding: 12px; color: var(--neon-blue); text-align: center; font-family: 'Orbitron'; width: 80%; margin-bottom: 20px; }
        .hidden { display: none !important; }
        .streak-badge { color: gold; font-weight: bold; font-size: 1.2rem; height: 25px; }
    </style>
</head>
<body>

<div id="main-wrapper">
    <div id="quiz-container">
        <div id="timer-container"><div id="timer-bar"></div></div>
        
        <div id="start-screen">
            <h1>NEON PULSE</h1>
            <div id="login-zone">
                <input type="text" id="username-input" placeholder="CODE NAME..." maxlength="12">
                <button onclick="joinLobby()" style="width:100%; border-color: var(--neon-pink); color: var(--neon-pink);">REJOINDRE</button>
            </div>
            <div id="lobby-zone" class="hidden">
                <p id="host-msg" style="color:var(--neon-blue); margin-bottom:10px;">EN ATTENTE...</p>
                <div id="lobby-list" style="margin-bottom:20px; border: 1px dashed var(--neon-blue); padding:10px;"></div>
                <button id="start-btn" onclick="requestStart()" class="hidden" style="width:100%; border-color: var(--neon-green); color: var(--neon-green);">LANCER LA PARTIE ⚡</button>
            </div>
        </div>

        <div id="game-screen" class="hidden">
            <div id="streak-info" class="streak-badge"></div>
            <div id="q-info" style="font-family:Orbitron; font-size:0.8rem; color:var(--neon-blue); margin-bottom:10px;">SIGNAL <span id="q-num">1</span>/50</div>
            <div id="question" style="margin-bottom:20px; font-size:1.3rem; min-height: 80px;">...</div>
            <div id="options" class="btn-stack"></div>
            <div id="score-display" style="margin-top:25px; font-family:Orbitron; color:var(--neon-pink); font-size: 1.5rem;">XP: <span id="score-val">0000</span></div>
        </div>

        <div id="winner-screen" class="hidden">
            <h1 style="color:gold;">👑 CHAMPION</h1>
            <h2 id="winner-name" style="font-size: 2.5rem; color: var(--neon-blue);">---</h2>
            <button onclick="location.reload()">RETOUR AU MENU</button>
        </div>
    </div>

    <div id="chat-container">
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Message..." maxlength="50">
        </div>
    </div>
</div>

<audio id="bgm" loop></audio>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let currentCorrectAnswer = "";
    let isHost = false;

    function joinLobby() {
        const name = document.getElementById("username-input").value.trim().toUpperCase() || "INT_" + Math.floor(Math.random()*999);
        const bgm = document.getElementById("bgm");
        bgm.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3";
        bgm.volume = 0.15; bgm.play();
        
        document.getElementById("login-zone").classList.add("hidden");
        document.getElementById("lobby-zone").classList.remove("hidden");
        socket.emit('joinGame', name);
    }

    socket.on('hostStatus', (status) => {
        isHost = status;
        const btn = document.getElementById("start-btn");
        const msg = document.getElementById("host-msg");
        if(isHost) {
            btn.classList.remove("hidden");
            msg.innerText = "VOUS ÊTES LE CHEF";
        } else {
            btn.classList.add("hidden");
            msg.innerText = "ATTENTE DU CHEF...";
        }
    });

    function requestStart() {
        socket.emit('startGameRequest');
    }

    socket.on('updateLobby', (players) => {
        document.getElementById("lobby-list").innerHTML = players.map(p => `<div>${p.username} ${p.isHost ? '⭐' : ''}</div>`).join('');
    });

    socket.on('gameStart', () => {
        document.getElementById("start-screen").classList.add("hidden");
        document.getElementById("game-screen").classList.remove("hidden");
    });

    socket.on('nextQuestion', (qData) => {
        currentCorrectAnswer = qData.correct;
        document.getElementById("q-num").innerText = qData.number;
        document.getElementById("question").innerText = qData.text;
        const container = document.getElementById("options");
        container.innerHTML = "";
        qData.choices.forEach(choice => {
            const btn = document.createElement("button");
            btn.innerText = choice;
            btn.onclick = () => {
                const ok = (choice === qData.correct);
                reveal(btn, ok);
                socket.emit('submitAnswer', { isCorrect: ok });
            };
            container.appendChild(btn);
        });
    });

    socket.on('timerUpdate', (time) => {
        document.getElementById("timer-bar").style.width = (time/15)*100 + "%";
    });

    // En cas de temps écoulé
    socket.on('timeUp', () => reveal(null, false));

    socket.on('feedback', (data) => {
        if(data.type === 'correct' && data.streak >= 3) {
            document.getElementById("streak-info").innerText = "SÉRIE X" + data.streak + " ! 🔥";
        } else if (data.type === 'wrong') {
            document.getElementById("streak-info").innerText = "";
        }
    });

    function reveal(clickedBtn, isCorrect) {
        const buttons = document.querySelectorAll('#options button');
        buttons.forEach(b => {
            b.disabled = true;
            // ICI : On force l'affichage du vert sur la bonne réponse pour TOUT LE MONDE
            if (b.innerText === currentCorrectAnswer) {
                b.classList.add('correct');
            }
        });
        // Si le bouton cliqué est faux, on le met en rouge
        if (clickedBtn && !isCorrect) {
            clickedBtn.classList.add('wrong');
        }
    }

    socket.on('yourScore', (score) => document.getElementById("score-val").innerText = score.toString().padStart(4, '0'));

    document.getElementById("chat-input").addEventListener("keypress", (e) => {
        if(e.key === "Enter" && e.target.value.trim()) {
            socket.emit('chatMessage', e.target.value);
            e.target.value = "";
        }
    });

    socket.on('newChatMessage', (data) => {
        const msgDiv = document.createElement("div");
        msgDiv.innerHTML = `<b style="color:var(--neon-blue)">${data.user}:</b> ${data.text}`;
        const chatBox = document.getElementById("chat-messages");
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    socket.on('gameOver', (data) => {
        document.getElementById("game-screen").classList.add("hidden");
        document.getElementById("winner-screen").classList.remove("hidden");
        document.getElementById("winner-name").innerText = data.winner;
    });
</script>
</body>
</html>
